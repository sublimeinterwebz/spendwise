name: Deploy Spendwise

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug - list files
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in directory:"
          ls -la

      - name: Inject Gemini API key
        run: sed -i "s|YOUR_GEMINI_API_KEY|${{ secrets.GEMINI_API_KEY }}|g" index.html

      - name: Verify injection
        run: |
          if grep -q "YOUR_GEMINI_API_KEY" index.html; then
            echo "ERROR: Key was not injected. Check secret name."
            exit 1
          else
            echo "Key injected successfully."
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
