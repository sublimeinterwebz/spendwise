<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Spendwise</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="icon" href="InShot_20260321_223346698.png" type="image/png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0f; --surface: #16161a; --surface2: #1e1e24; --border: #2a2a35;
    --accent: #e8ff4d; --accent2: #ff6b6b; --accent3: #4dffb4;
    --text: #f0f0f5; --muted: #7a7a8c;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; max-width: 430px; margin: 0 auto; overflow-x: hidden; }

  .header { padding: 20px 20px 0; position: sticky; top: 0; background: var(--bg); z-index: 100; }
  .header-top { display: flex; justify-content: center; align-items: center; margin-bottom: 6px; }
  .month-nav { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .month-btn { background: var(--surface2); border: none; color: var(--text); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .month-btn:active { background: var(--border); }
  .current-month { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; min-width: 140px; text-align: center; line-height: 1.3; }

  .summary-card { margin: 16px 20px 0; background: var(--surface); border-radius: 20px; padding: 20px; border: 1px solid var(--border); position: relative; overflow: hidden; }
  .summary-card::before { content: ''; position: absolute; top: -40px; right: -40px; width: 140px; height: 140px; background: radial-gradient(circle, rgba(232,255,77,0.08) 0%, transparent 70%); border-radius: 50%; }
  .summary-label { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .summary-amount { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 38px; letter-spacing: -1px; color: var(--text); line-height: 1; }
  .summary-amount span { color: var(--accent); font-size: 24px; vertical-align: top; margin-top: 6px; display: inline-block; }
  .summary-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .cat-row { display: flex; gap: 8px; overflow-x: auto; padding: 14px 20px 0; scrollbar-width: none; }
  .cat-row::-webkit-scrollbar { display: none; }
  .cat-pill { display: flex; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
  .cat-pill.active { border-color: var(--accent); background: rgba(232,255,77,0.08); color: var(--accent); }
  .cat-dot { width: 7px; height: 7px; border-radius: 50%; }

  .add-fab { position: fixed; bottom: 24px; right: 24px; width: 60px; height: 60px; background: var(--accent); border: none; border-radius: 50%; cursor: pointer; font-size: 28px; color: #000; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(232,255,77,0.35); transition: transform 0.2s, box-shadow 0.2s; z-index: 200; font-weight: 300; }
  .add-fab:active { transform: scale(0.93); }

  .nav-tabs { display: flex; gap: 4px; padding: 14px 20px 0; }
  .nav-tab { flex: 1; background: transparent; border: none; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 0; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .section { padding: 16px 20px 100px; }
  .day-group { margin-bottom: 20px; }
  .day-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 500; }
  .tx-item { display: flex; align-items: center; gap: 12px; background: var(--surface); border-radius: 14px; padding: 12px 14px; margin-bottom: 6px; border: 1px solid var(--border); animation: slideIn 0.25s ease; cursor: pointer; transition: border-color 0.2s; }
  .tx-item:active { border-color: var(--accent); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .tx-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-cat { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .tx-amount { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--accent2); flex-shrink: 0; }
  .tx-delete { background: none; border: none; color: var(--border); cursor: pointer; font-size: 16px; padding: 4px; transition: color 0.2s; flex-shrink: 0; }
  .tx-delete:active { color: var(--accent2); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  .chart-section { padding: 16px 20px 100px; }
  .chart-card { background: var(--surface); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 16px; }
  .chart-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; margin-bottom: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 12px; width: 90px; flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
  .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }
  .bar-val { font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 700; width: 56px; text-align: right; flex-shrink: 0; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; backdrop-filter: blur(4px); }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); border: 1px solid var(--border); border-bottom: none; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input[type="date"] { color-scheme: dark; }
  .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .cat-option { display: flex; flex-direction: column; align-items: center; gap: 4px; background: var(--surface2); border: 2px solid transparent; border-radius: 12px; padding: 10px 6px; cursor: pointer; transition: all 0.15s; font-size: 11px; color: var(--muted); }
  .cat-option .emoji { font-size: 20px; }
  .cat-option.selected { border-color: var(--accent); background: rgba(232,255,77,0.07); color: var(--accent); }
  .submit-btn { width: 100%; background: var(--accent); border: none; border-radius: 14px; padding: 16px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: #000; cursor: pointer; margin-top: 8px; transition: opacity 0.2s, transform 0.2s; }
  .submit-btn:active { opacity: 0.85; transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .amount-input-wrap { position: relative; }
  .amount-prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--muted); }
  .form-input.amount-field { padding-left: 52px; font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }

  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent3); display: inline-block; margin-left: 6px; vertical-align: middle; transition: background 0.3s; }
  .sync-dot.syncing { background: #fdcb6e; animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--accent2); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Migration toast */
  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--accent); color: var(--accent); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 20px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="month-nav">
      <button class="month-btn" id="prevCycle">‹</button>
      <div class="current-month" id="monthLabel"></div>
      <button class="month-btn" id="nextCycle">›</button>
    </div>
  </div>
</div>

<div class="summary-card" style="margin-top:16px; margin-left:20px; margin-right:20px;">
  <div class="summary-label">Total Spent <span class="sync-dot" id="syncDot" title="Synced"></span></div>
  <div class="summary-amount"><span>EGP </span><span id="totalAmount">0</span></div>
  <div class="summary-sub" id="txCount">0 transactions this cycle</div>
</div>

<div class="cat-row" id="catFilter"></div>

<div class="nav-tabs">
  <button class="nav-tab active" id="tabTransactions">Transactions</button>
  <button class="nav-tab" id="tabSummary">Summary</button>
</div>

<div id="transactionsView" class="section">
  <div id="txList"><div class="empty-state"><div class="emoji">⏳</div><p>Connecting to cloud…</p></div></div>
</div>

<div id="summaryView" class="chart-section" style="display:none;">
  <div class="chart-card"><div class="chart-title">By Category</div><div class="bar-chart" id="barChart"></div></div>
  <div class="chart-card"><div class="chart-title">By Week</div><div class="bar-chart" id="weekChart"></div></div>
  <div class="chart-card"><div class="chart-title">By Day</div><div class="bar-chart" id="dailyChart"></div></div>
</div>

<button class="add-fab" id="fabBtn">+</button>
<div class="toast" id="toast"></div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Expense</div>
    <div class="form-group">
      <label class="form-label">Amount (EGP)</label>
      <div class="amount-input-wrap">
        <span class="amount-prefix">EGP</span>
        <input class="form-input amount-field" id="amountInput" type="number" inputmode="decimal" placeholder="0.00" min="0">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" id="descInput" type="text" placeholder="e.g. Uber, Groceries…">
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input class="form-input" id="dateInput" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <div class="cat-grid" id="catGrid"></div>
    </div>
    <button class="submit-btn" id="addBtn">Add Expense</button>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div class="modal-title" style="margin-bottom:0">Edit Expense</div>
      <button id="deleteFromEditBtn" style="background:rgba(255,107,107,0.12);border:none;color:var(--accent2);font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;font-family:'Syne',sans-serif;">Delete</button>
    </div>
    <div class="form-group">
      <label class="form-label">Amount (EGP)</label>
      <div class="amount-input-wrap">
        <span class="amount-prefix">EGP</span>
        <input class="form-input amount-field" id="editAmountInput" type="number" inputmode="decimal" placeholder="0.00" min="0">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" id="editDescInput" type="text" placeholder="e.g. Uber, Groceries…">
    </div>
    <div class="form-group">
      <label class="form-label">Date</label>
      <input class="form-input" id="editDateInput" type="date" style="color-scheme:dark">
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <div class="cat-grid" id="editCatGrid"></div>
    </div>
    <button class="submit-btn" id="saveBtn">Save Changes</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase init ─────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAWatbVgO0FFcmjRVb8W-T_oj3aK0sd5T8",
  authDomain: "spendwise-35975.firebaseapp.com",
  projectId: "spendwise-35975",
  storageBucket: "spendwise-35975.firebasestorage.app",
  messagingSenderId: "724815825045",
  appId: "1:724815825045:web:942b11f51d06b8ca8eb39c"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const expensesCol = collection(db, 'expenses');

// ── constants ─────────────────────────────────────────────
const CATEGORIES = [
  { id: 'supermarket',  label: 'Supermarket', emoji: '🛒', color: '#55efc4' },
  { id: 'fastfood',     label: 'Fast Food',   emoji: '🍔', color: '#ff9f43' },
  { id: 'gas',          label: 'Gas',         emoji: '⛽', color: '#4da6ff' },
  { id: 'dating',       label: 'Dating',      emoji: '💘', color: '#ff6b9d' },
  { id: 'creditcard',   label: 'Credit Card', emoji: '💳', color: '#a29bfe' },
  { id: 'savings',      label: 'Savings',     emoji: '🏦', color: '#e8ff4d' },
  { id: 'utilities',    label: 'Utilities',   emoji: '⚡', color: '#fdcb6e' },
  { id: 'shopping',     label: 'Shopping',    emoji: '🛍️', color: '#ff6b9d' },
  { id: 'health',       label: 'Health',      emoji: '💊', color: '#55efc4' },
  { id: 'misc',         label: 'Misc',        emoji: '📦', color: '#b2bec3' },
];
const SALARY_DAY = 24;
const LS_KEY = 'spendwise_expenses';
const MIGRATED_KEY = 'spendwise_migrated';

// ── state ─────────────────────────────────────────────────
let expenses = [];
let activeFilter = 'all';
let selectedCat = 'supermarket';
let selectedEditCat = 'supermarket';
let cycleOffset = 0;
let editingId = null;

// ── toast ─────────────────────────────────────────────────
function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ── sync indicator ────────────────────────────────────────
function setSyncState(state) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  dot.title = state === 'syncing' ? 'Saving…' : state === 'error' ? 'Sync error' : 'Synced';
}

// ── localStorage migration ────────────────────────────────
// In-memory lock prevents re-running if onSnapshot fires multiple times
let _migrationDone = false;

async function migrateFromLocalStorage() {
  if (_migrationDone || localStorage.getItem(MIGRATED_KEY)) {
    _migrationDone = true;
    return;
  }
  _migrationDone = true; // set lock immediately before any async work

  let oldData = [];
  try {
    oldData = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
  } catch (e) {
    localStorage.setItem(MIGRATED_KEY, '1');
    return;
  }

  if (!Array.isArray(oldData) || oldData.length === 0) {
    localStorage.setItem(MIGRATED_KEY, '1');
    return;
  }

  showToast('Migrating ' + oldData.length + ' old expenses...');
  setSyncState('syncing');

  try {
    const chunks = [];
    for (let i = 0; i < oldData.length; i += 400) chunks.push(oldData.slice(i, i + 400));

    for (const chunk of chunks) {
      const batch = writeBatch(db);
      chunk.forEach(e => {
        const ref = doc(expensesCol);
        batch.set(ref, {
          amount: Number(e.amount) || 0,
          desc: e.desc || '',
          cat: e.cat || 'misc',
          date: e.date || new Date().toISOString(),
        });
      });
      await batch.commit();
    }

    localStorage.setItem(MIGRATED_KEY, '1');
    localStorage.removeItem(LS_KEY);
    showToast(oldData.length + ' expenses restored!');
  } catch (err) {
    console.error('Migration failed:', err);
    _migrationDone = false; // allow retry on next reload
    showToast('Migration failed, will retry next time.');
    setSyncState('error');
  }
}

// ── Firebase real-time listener ───────────────────────────
let _firstSnapshot = true;
onSnapshot(expensesCol, async (snapshot) => {
  expenses = snapshot.docs.map(d => ({ ...d.data(), _docId: d.id }));
  setSyncState('synced');
  render();
  // Only attempt migration once, on the very first snapshot
  if (_firstSnapshot) {
    _firstSnapshot = false;
    await migrateFromLocalStorage();
  }
}, (err) => {
  console.error('Firestore error:', err);
  setSyncState('error');
  document.getElementById('txList').innerHTML =
    '<div class="empty-state"><div class="emoji">⚠️</div><p>Could not connect.<br>Check your internet connection.</p></div>';
});


// ── cycle helpers ─────────────────────────────────────────
function getCycleBounds(offset) {
  const now = new Date();
  let yr = now.getFullYear(), mo = now.getMonth();
  if (now.getDate() < SALARY_DAY) { mo--; if (mo < 0) { mo = 11; yr--; } }
  mo += offset;
  while (mo < 0) { mo += 12; yr--; }
  while (mo > 11) { mo -= 12; yr++; }
  const start = new Date(yr, mo, SALARY_DAY, 0, 0, 0);
  let emo = mo + 1, eyr = yr;
  if (emo > 11) { emo = 0; eyr++; }
  const end = new Date(eyr, emo, SALARY_DAY - 1, 23, 59, 59);
  return { start, end };
}

function getCycleExpenses() {
  const { start, end } = getCycleBounds(cycleOffset);
  return expenses.filter(e => { const d = new Date(e.date); return d >= start && d <= end; });
}

function updateCycleLabel() {
  const { start, end } = getCycleBounds(cycleOffset);
  const f = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  document.getElementById('monthLabel').textContent = `${f(start)} – ${f(end)}`;
}

// ── utils ─────────────────────────────────────────────────
function getCat(id) { return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length - 1]; }
function fmt(n) { return Number(n).toLocaleString('en-EG', { minimumFractionDigits: 0, maximumFractionDigits: 0 }); }
function todayValue() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── render ────────────────────────────────────────────────
function buildCatFilter() {
  const row = document.getElementById('catFilter');
  row.innerHTML = '';
  const allPill = document.createElement('div');
  allPill.className = 'cat-pill' + (activeFilter === 'all' ? ' active' : '');
  allPill.innerHTML = `<div class="cat-dot" style="background:var(--accent)"></div> All`;
  allPill.addEventListener('click', () => { activeFilter = 'all'; buildCatFilter(); renderTransactions(); });
  row.appendChild(allPill);
  CATEGORIES.forEach(c => {
    const pill = document.createElement('div');
    pill.className = 'cat-pill' + (activeFilter === c.id ? ' active' : '');
    pill.innerHTML = `<div class="cat-dot" style="background:${c.color}"></div>${c.label}`;
    pill.addEventListener('click', () => { activeFilter = c.id; buildCatFilter(); renderTransactions(); });
    row.appendChild(pill);
  });
}

function renderTransactions() {
  let txs = getCycleExpenses();
  const total = txs.reduce((s, e) => s + Number(e.amount), 0);
  document.getElementById('totalAmount').textContent = fmt(total);
  document.getElementById('txCount').textContent = `${txs.length} transaction${txs.length !== 1 ? 's' : ''} this cycle`;

  if (activeFilter !== 'all') txs = txs.filter(e => e.cat === activeFilter);

  const list = document.getElementById('txList');
  if (txs.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">💸</div><p>No expenses yet.<br>Tap <b>+</b> to add your first one.</p></div>`;
    return;
  }

  const groups = {};
  txs.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(e => {
    const key = new Date(e.date).toDateString();
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });

  const todayStr = new Date().toDateString();
  const yesterdayStr = new Date(Date.now() - 86400000).toDateString();

  list.innerHTML = '';
  Object.entries(groups).forEach(([day, items]) => {
    const label = day === todayStr ? 'Today' : day === yesterdayStr ? 'Yesterday'
      : new Date(day).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const dayTotal = items.reduce((s, e) => s + Number(e.amount), 0);
    const group = document.createElement('div');
    group.className = 'day-group';
    group.innerHTML = `<div class="day-label">${label} · EGP ${fmt(dayTotal)}</div>`;
    items.forEach(e => {
      const cat = getCat(e.cat);
      const item = document.createElement('div');
      item.className = 'tx-item';
      item.id = 'tx-' + e._docId;
      item.innerHTML = `
        <div class="tx-icon" style="background:${cat.color}22">${cat.emoji}</div>
        <div class="tx-info">
          <div class="tx-name">${e.desc || cat.label}</div>
          <div class="tx-cat">${cat.label}</div>
        </div>
        <div class="tx-amount">−${fmt(e.amount)}</div>
        <button class="tx-delete">✕</button>`;
      item.addEventListener('click', () => openEditModal(e._docId));
      item.querySelector('.tx-delete').addEventListener('click', ev => { ev.stopPropagation(); deleteExpense(e._docId); });
      group.appendChild(item);
    });
    list.appendChild(group);
  });
}

function renderSummary() {
  const txs = getCycleExpenses();
  const { start } = getCycleBounds(cycleOffset);

  // By category
  const catTotals = {};
  txs.forEach(e => { catTotals[e.cat] = (catTotals[e.cat] || 0) + Number(e.amount); });
  const sortedCats = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
  const maxCat = Math.max(...sortedCats.map(([,v]) => v), 1);
  document.getElementById('barChart').innerHTML = sortedCats.length === 0
    ? '<div style="color:var(--muted);font-size:13px;">No data yet.</div>'
    : sortedCats.map(([id, val]) => {
        const cat = getCat(id);
        return `<div class="bar-row"><div class="bar-label"><span>${cat.emoji}</span>${cat.label}</div><div class="bar-track"><div class="bar-fill" style="width:${(val/maxCat*100).toFixed(1)}%;background:${cat.color}"></div></div><div class="bar-val" style="color:${cat.color}">${fmt(val)}</div></div>`;
      }).join('');

  // By week — clamp week index to 0-3 to avoid negative or out-of-range buckets
  const weekTotals = { 'Week 1': 0, 'Week 2': 0, 'Week 3': 0, 'Week 4': 0 };
  txs.forEach(e => {
    const diff = Math.floor((new Date(e.date) - start) / 86400000);
    const wk = Math.min(Math.max(Math.floor(diff / 7), 0), 3);
    weekTotals[`Week ${wk + 1}`] += Number(e.amount);
  });
  const maxWeek = Math.max(...Object.values(weekTotals), 1);
  document.getElementById('weekChart').innerHTML = Object.entries(weekTotals).map(([label, val]) =>
    `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${(val/maxWeek*100).toFixed(1)}%;background:var(--accent3)"></div></div><div class="bar-val" style="color:var(--accent3)">${fmt(val)}</div></div>`
  ).join('');

  // By day
  const dayTotals = {};
  txs.forEach(e => {
    const label = new Date(e.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    dayTotals[label] = (dayTotals[label] || 0) + Number(e.amount);
  });
  const maxDay = Math.max(...Object.values(dayTotals), 1);
  const dayEntries = Object.entries(dayTotals).sort((a, b) => new Date(a[0] + ' 2000') - new Date(b[0] + ' 2000'));
  document.getElementById('dailyChart').innerHTML = dayEntries.length === 0
    ? '<div style="color:var(--muted);font-size:13px;">No data yet.</div>'
    : dayEntries.map(([label, val]) =>
        `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${(val/maxDay*100).toFixed(1)}%;background:var(--accent)"></div></div><div class="bar-val" style="color:var(--accent)">${fmt(val)}</div></div>`
      ).join('');
}

function render() {
  updateCycleLabel();
  buildCatFilter();
  renderTransactions();
}

// ── cat grids ─────────────────────────────────────────────
function buildCatGrid() {
  document.getElementById('catGrid').innerHTML = CATEGORIES.map(c =>
    `<div class="cat-option ${c.id === selectedCat ? 'selected' : ''}" data-id="${c.id}">
      <span class="emoji">${c.emoji}</span>${c.label}
    </div>`).join('');
  document.querySelectorAll('#catGrid .cat-option').forEach(el => {
    el.addEventListener('click', () => {
      selectedCat = el.dataset.id;
      document.querySelectorAll('#catGrid .cat-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
    });
  });
}

function buildEditCatGrid() {
  document.getElementById('editCatGrid').innerHTML = CATEGORIES.map(c =>
    `<div class="cat-option ${c.id === selectedEditCat ? 'selected' : ''}" data-id="${c.id}">
      <span class="emoji">${c.emoji}</span>${c.label}
    </div>`).join('');
  document.querySelectorAll('#editCatGrid .cat-option').forEach(el => {
    el.addEventListener('click', () => {
      selectedEditCat = el.dataset.id;
      document.querySelectorAll('#editCatGrid .cat-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
    });
  });
}

// ── modals ────────────────────────────────────────────────
function openModal() {
  selectedCat = 'supermarket';
  document.getElementById('dateInput').value = todayValue();
  document.getElementById('amountInput').value = '';
  document.getElementById('descInput').value = '';
  buildCatGrid();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('amountInput').focus(), 300);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function openEditModal(docId) {
  const e = expenses.find(ex => ex._docId === docId);
  if (!e) return;
  editingId = docId;
  document.getElementById('editAmountInput').value = e.amount;
  document.getElementById('editDescInput').value = e.desc || '';
  const d = new Date(e.date);
  document.getElementById('editDateInput').value =
    `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  selectedEditCat = e.cat;
  buildEditCatGrid();
  document.getElementById('editModalOverlay').classList.add('open');
}
function closeEditModal() {
  document.getElementById('editModalOverlay').classList.remove('open');
  editingId = null;
}

// ── CRUD ──────────────────────────────────────────────────
async function addExpense() {
  const amount = parseFloat(document.getElementById('amountInput').value);
  const desc = document.getElementById('descInput').value.trim();
  const dateVal = document.getElementById('dateInput').value || todayValue();
  if (!amount || amount <= 0) { document.getElementById('amountInput').focus(); return; }
  const [y, m, d] = dateVal.split('-').map(Number);
  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  setSyncState('syncing');
  try {
    await addDoc(expensesCol, {
      amount,
      desc,
      cat: selectedCat,
      date: new Date(y, m - 1, d, 12, 0, 0).toISOString()
    });
    closeModal();
  } catch (err) {
    console.error(err);
    setSyncState('error');
    showToast('⚠️ Failed to save. Try again.');
  } finally {
    btn.disabled = false;
  }
}

async function deleteExpense(docId) {
  const el = document.getElementById('tx-' + docId);
  if (el) {
    el.style.opacity = '0';
    el.style.transform = 'translateX(20px)';
    el.style.transition = 'all 0.2s';
  }
  setSyncState('syncing');
  try {
    await deleteDoc(doc(db, 'expenses', docId));
  } catch (err) {
    console.error(err);
    setSyncState('error');
    showToast('⚠️ Failed to delete. Try again.');
  }
}

async function saveEdit() {
  const amount = parseFloat(document.getElementById('editAmountInput').value);
  const desc = document.getElementById('editDescInput').value.trim();
  const dateVal = document.getElementById('editDateInput').value || todayValue();
  if (!amount || amount <= 0) { document.getElementById('editAmountInput').focus(); return; }
  const [y, m, d] = dateVal.split('-').map(Number);
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  setSyncState('syncing');
  try {
    await updateDoc(doc(db, 'expenses', editingId), {
      amount,
      desc,
      cat: selectedEditCat,
      date: new Date(y, m - 1, d, 12, 0, 0).toISOString()
    });
    closeEditModal();
  } catch (err) {
    console.error(err);
    setSyncState('error');
    showToast('⚠️ Failed to save. Try again.');
  } finally {
    btn.disabled = false;
  }
}

async function deleteFromEdit() {
  if (!editingId) return;
  setSyncState('syncing');
  try {
    await deleteDoc(doc(db, 'expenses', editingId));
    closeEditModal();
  } catch (err) {
    console.error(err);
    setSyncState('error');
    showToast('⚠️ Failed to delete. Try again.');
  }
}

// ── tabs ──────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('tabTransactions').classList.toggle('active', tab === 'transactions');
  document.getElementById('tabSummary').classList.toggle('active', tab === 'summary');
  document.getElementById('transactionsView').style.display = tab === 'transactions' ? '' : 'none';
  document.getElementById('summaryView').style.display = tab === 'summary' ? '' : 'none';
  if (tab === 'summary') renderSummary();
}

// ── event listeners ───────────────────────────────────────
document.getElementById('prevCycle').addEventListener('click', () => { cycleOffset--; render(); });
document.getElementById('nextCycle').addEventListener('click', () => { cycleOffset++; render(); });
document.getElementById('fabBtn').addEventListener('click', openModal);
document.getElementById('addBtn').addEventListener('click', addExpense);
document.getElementById('saveBtn').addEventListener('click', saveEdit);
document.getElementById('deleteFromEditBtn').addEventListener('click', deleteFromEdit);
document.getElementById('tabTransactions').addEventListener('click', () => switchTab('transactions'));
document.getElementById('tabSummary').addEventListener('click', () => switchTab('summary'));
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.getElementById('editModalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('editModalOverlay')) closeEditModal();
});

// ── init ──────────────────────────────────────────────────
buildCatGrid();
render();
</script>
</body>
</html>
